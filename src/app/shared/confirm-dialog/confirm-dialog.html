<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton="outlined" (click)="onCancel()">{{ data.cancelLabel ?? 'Cancel' }}</button>
  <button
    matButton="filled"
    [color]="data.destructive ? 'warn' : 'primary'"
    (click)="onConfirm()"
    cdkFocusInitial
  >
    {{ data.confirmLabel ?? 'Confirm' }}
  </button>
</mat-dialog-actions>
